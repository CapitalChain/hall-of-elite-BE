name: Deploy Hall of Elite Backend

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      # 1️⃣ Checkout code
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2️⃣ Setup Node.js
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      # 3️⃣ Install dependencies and build
      - name: Build project
        run: |
          npm ci
          npm run build

      # 4️⃣ Deploy and run production commands via SSH
      - name: Deploy to server via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.REMOTE_HOST }}
          username: bhallofelite
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: 22
          script: |
            set -e
            echo "📂 Navigating to backend folder..."
            cd /home/bhallofelite/hall-of-elite-BE

            echo "💾 Backing up .env (server-only, not in repo)..."
            cp -a .env .env.backup 2>/dev/null || true

            echo "📥 Fetching latest code from main..."
            git fetch origin main

            echo "🔄 Resetting to origin/main (discard local changes to tracked files)..."
            git reset --hard origin/main

            echo "🔙 Restoring .env from backup..."
            if [ -f .env.backup ]; then mv .env.backup .env; fi

            echo "📦 Installing all dependencies (need devDependencies for tsc build)..."
            npm ci

            echo "🧹 Cleaning old build (avoid missing modules like auth-token.service)..."
            rm -rf dist

            echo "🔨 Building..."
            npm run build

            echo "📦 Pruning to production dependencies only..."
            npm prune --production

            echo "🗄 Running Prisma migrations (optional)..."
            npx prisma migrate deploy --schema=./src/prisma/schema.prisma 2>/dev/null || true

            echo "🚀 Restarting PM2 process..."
            pm2 restart hall-of-elite-be || pm2 start dist/index.js --name hall-of-elite-be

            pm2 save

            echo "✅ Backend deployment completed"