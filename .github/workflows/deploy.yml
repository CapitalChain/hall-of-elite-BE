name: Deploy Hall of Elite Backend

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      # 1️⃣ Checkout code
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2️⃣ Setup Node.js
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      # 3️⃣ Install dependencies and build
      - name: Build project
        run: |
          npm ci
          npm run build

      # 4️⃣ Deploy and run production commands via SSH
      - name: Deploy to server via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.REMOTE_HOST }}
          username: bhallofelite
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: 22
          script: |
            echo "📂 Navigating to backend folder..."
            cd /home/bhallofelite/hall-of-elite-BE

            echo "🔄 Installing production dependencies..."
            npm ci --omit=dev

            echo "🗄 Running Prisma migrations..."
            npx prisma migrate deploy --schema=./src/prisma/schema.prisma || true

            echo "🚀 Restarting PM2 process..."
            pm2 restart hall-of-elite-be || pm2 start dist/index.js --name hall-of-elite-be

            pm2 save

            echo "✅ Backend deployment completed"